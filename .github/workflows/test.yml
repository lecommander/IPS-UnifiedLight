name: UnifiedLight Tests
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  syntax:
    name: PHP & JSON Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: none

      - name: PHP Syntax Check
        run: php -l LightDevice/module.php

      - name: JSON Validation (form.json)
        run: python -m json.tool LightDevice/form.json > /dev/null

      - name: JSON Validation (module.json)
        run: python -m json.tool LightDevice/module.json > /dev/null

      - name: Validate form.json Element Types Against IPS Specification
        run: |
          echo "Validating all form.json element types against IPS SDK specification..."
          python3 -c "
          import json, sys

          # Official IPS supported form element types per SDK documentation
          # https://www.symcon.de/de/service/dokumentation/entwicklerbereich/sdk-tools/sdk-php/configuration-forms/
          VALID_TYPES = {
              'Select',           # Dropdown selection
              'SelectInstance',   # Instance picker from object tree
              'SelectVariable',   # Variable picker from object tree
              'ValidationTextBox', # Text input field (NOT TextField)
              'NumberSpinner',    # Number input with min/max constraints
              'Label',            # Static text label
              'Button',           # Action button with onClick handler
              'CheckBox',         # Checkbox
              'Switch',           # Toggle switch
              'Expandable',       # Collapsible section
              'Panel',            # Grouping panel
              'ColorPicker',      # Color picker
              'Location',         # Location picker
              'Timer',            # Timer configuration
              'Link',             # Link field
              'TestCenter',       # Test center action
          }

          with open('LightDevice/form.json') as f:
              form = json.load(f)

          errors = []

          # Check all elements
          for i, el in enumerate(form.get('elements', [])):
              etype = el.get('type')
              if etype is None:
                  errors.append(f'Element {i}: missing \"type\" field')
              elif etype not in VALID_TYPES:
                  errors.append(f'Element {i}: unsupported type \"{etype}\" (valid: {sorted(VALID_TYPES)})')

          # Check all actions
          for i, el in enumerate(form.get('actions', [])):
              etype = el.get('type')
              if etype is None:
                  errors.append(f'Action {i}: missing \"type\" field')
              elif etype not in VALID_TYPES:
                  errors.append(f'Action {i}: unsupported type \"{etype}\" (valid: {sorted(VALID_TYPES)})')

          # Check all status entries
          VALID_ICONS = {'active', 'error', 'execute'}
          for i, el in enumerate(form.get('status', [])):
              if 'code' not in el:
                  errors.append(f'Status {i}: missing \"code\" field')
              if 'caption' not in el:
                  errors.append(f'Status {i}: missing \"caption\" field')
              icon = el.get('icon')
              if icon and icon not in VALID_ICONS:
                  errors.append(f'Status {i}: invalid icon \"{icon}\" (valid: {sorted(VALID_ICONS)})')

          if errors:
              print('ERROR: form.json validation failed:')
              for e in errors:
                  print(f'  - {e}')
              sys.exit(1)

          all_types = set(el.get('type') for el in form.get('elements', []) if 'type' in el)
          print('All ' + str(len(all_types)) + ' element types are valid IPS form types: ' + str(sorted(all_types)))

          # Check that each element type appears only once (no duplicate types)
          from collections import Counter
          type_counts = Counter(el.get('type') for el in form.get('elements', []) if 'type' in el)
          duplicate_types = {t: c for t, c in type_counts.items() if c > 1}
          if duplicate_types:
              print('ERROR: Duplicate element types found (each type should appear only once):')
              for t, c in duplicate_types.items():
                  print(f'  Type \"{t}\" appears {c} times')
              sys.exit(1)
          print('No duplicate element types found.')
          "

      - name: Check form.json for Duplicate Property Names
        run: |
          echo "Checking form.json property names match RegisterProperty calls..."
          python3 -c "
          import json, sys

          with open('LightDevice/form.json') as f:
              form = json.load(f)

          with open('LightDevice/module.php') as f:
              php = f.read()

          form_names = set()
          for el in form.get('elements', []):
              if 'name' in el:
                  form_names.add(el['name'])

          missing = []
          for name in form_names:
              if 'RegisterProperty' not in php or \"'\" + name + \"'\" not in php:
                  missing.append(name)

          if missing:
              print('ERROR: form.json names not found in RegisterProperty calls: ' + str(missing))
              sys.exit(1)
          print('All ' + str(len(form_names)) + ' form property names match RegisterProperty calls.')
          "

      - name: Check form.json for Duplicate Property Names
        run: |
          echo "Checking for duplicate property names in form.json..."
          python3 -c "
          import json, sys
          from collections import Counter

          with open('LightDevice/form.json') as f:
              form = json.load(f)

          names = [el['name'] for el in form.get('elements', []) if 'name' in el]
          counts = Counter(names)
          duplicates = {n: c for n, c in counts.items() if c > 1}

          if duplicates:
              print('ERROR: Duplicate property names found in form.json:')
              for name, count in duplicates.items():
                  print(f'  {name}: appears {count} times')
              sys.exit(1)
          print('No duplicate property names found (' + str(len(set(names))) + ' unique names).')
          "

  structure:
    name: Module Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Backend Constants Defined
        run: |
          echo "Checking BACKEND_DMX constant..."
          grep -q "const BACKEND_DMX" LightDevice/module.php
          echo "Checking BACKEND_SHELLY constant..."
          grep -q "const BACKEND_SHELLY" LightDevice/module.php
          echo "Checking BACKEND_ZIGBEE2MQTT constant..."
          grep -q "const BACKEND_ZIGBEE2MQTT" LightDevice/module.php
          echo "Checking BACKEND_KNX constant..."
          grep -q "const BACKEND_KNX" LightDevice/module.php
          echo "Checking BACKEND_HMIP constant..."
          grep -q "const BACKEND_HMIP" LightDevice/module.php
          echo "Checking BACKEND_HMRF constant..."
          grep -q "const BACKEND_HMRF" LightDevice/module.php
          echo "Checking BACKEND_HMWIRED constant..."
          grep -q "const BACKEND_HMWIRED" LightDevice/module.php
          echo "Checking BACKEND_HUE constant..."
          grep -q "const BACKEND_HUE" LightDevice/module.php
          echo "Checking BACKEND_DALI constant..."
          grep -q "const BACKEND_DALI" LightDevice/module.php
          echo "Checking BACKEND_TASMOTA constant..."
          grep -q "const BACKEND_TASMOTA" LightDevice/module.php
          echo "Checking BACKEND_WLED constant..."
          grep -q "const BACKEND_WLED" LightDevice/module.php
          echo "All backend constants found."

      - name: Check Backend Files Exist
        run: |
          echo "Checking Backends directory structure..."
          test -f LightDevice/Backends/IBackend.php
          test -f LightDevice/Backends/DmxBackend.php
          test -f LightDevice/Backends/VariableBackend.php
          test -f LightDevice/Backends/KnxBackend.php
          test -f LightDevice/Backends/DaliBackend.php
          test -f LightDevice/Backends/HomeMaticBackend.php
          test -f LightDevice/Backends/WledBackend.php
          echo "All backend files exist."

      - name: Check ApplyChanges Validates All Backends
        run: |
          echo "Checking ApplyChanges validates DMX..."
          grep -q "case self::BACKEND_DMX:" LightDevice/module.php
          echo "Checking ApplyChanges validates Shelly..."
          grep -q "case self::BACKEND_SHELLY:" LightDevice/module.php
          echo "Checking ApplyChanges validates Zigbee2MQTT..."
          grep -q "case self::BACKEND_ZIGBEE2MQTT:" LightDevice/module.php
          echo "Checking ApplyChanges validates KNX..."
          grep -q "case self::BACKEND_KNX:" LightDevice/module.php
          echo "Checking ApplyChanges validates HomeMatic IP..."
          grep -q "case self::BACKEND_HMIP:" LightDevice/module.php
          echo "Checking ApplyChanges validates HomeMatic Funk..."
          grep -q "case self::BACKEND_HMRF:" LightDevice/module.php
          echo "Checking ApplyChanges validates HomeMatic Wired..."
          grep -q "case self::BACKEND_HMWIRED:" LightDevice/module.php
          echo "Checking ApplyChanges validates Hue..."
          grep -q "case self::BACKEND_HUE:" LightDevice/module.php
          echo "Checking ApplyChanges validates DALI..."
          grep -q "case self::BACKEND_DALI:" LightDevice/module.php
          echo "Checking ApplyChanges validates Tasmota..."
          grep -q "case self::BACKEND_TASMOTA:" LightDevice/module.php
          echo "Checking ApplyChanges validates WLED..."
          grep -q "case self::BACKEND_WLED:" LightDevice/module.php
          echo "All backends validated in ApplyChanges."

      - name: Check RequestAction Handles All Idents
        run: |
          echo "Checking RequestAction handles Power..."
          grep -q "case 'Power':" LightDevice/module.php
          echo "Checking RequestAction handles Brightness..."
          grep -q "case 'Brightness':" LightDevice/module.php
          echo "All idents handled in RequestAction."

      - name: Check Public API Functions Exist
        run: |
          echo "Checking SetPower..."
          grep -q "public function SetPower" LightDevice/module.php
          echo "Checking SetBrightness..."
          grep -q "public function SetBrightness" LightDevice/module.php
          echo "Checking Toggle..."
          grep -q "public function Toggle" LightDevice/module.php
          echo "Checking FadeTo..."
          grep -q "public function FadeTo" LightDevice/module.php
          echo "All public API functions found."

      - name: Check form.json Has BackendType Select
        run: |
          echo "Checking BackendType select in form.json..."
          python -c "
          import json, sys
          with open('LightDevice/form.json') as f:
              form = json.load(f)
          elements = form.get('elements', [])
          backend_type_found = False
          for el in elements:
              if el.get('name') == 'BackendType':
                  backend_type_found = True
                  options = el.get('options', [])
                  if len(options) < 3:
                      print('ERROR: BackendType must have at least 3 options')
                      sys.exit(1)
                  break
          if not backend_type_found:
              print('ERROR: BackendType select not found in form.json')
              sys.exit(1)
          print('BackendType select validated.')
          "

      - name: Check Status Codes Defined
        run: |
          echo "Checking status code 102 (Active)..."
          python -c "
          import json, sys
          with open('LightDevice/form.json') as f:
              form = json.load(f)
          status_codes = {s['code'] for s in form.get('status', [])}
          if 102 not in status_codes:
              print('ERROR: Status code 102 (Active) not defined')
              sys.exit(1)
          if 201 not in status_codes:
              print('ERROR: Status code 201 (Not configured) not defined')
              sys.exit(1)
          print('Status codes 102 and 201 validated.')
          "

  requirements:
    name: Requirements Doc Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check REQUIREMENTS.md Exists
        run: |
          if [ ! -f "docs/REQUIREMENTS.md" ]; then
            echo "ERROR: docs/REQUIREMENTS.md not found"
            exit 1
          fi
          echo "REQUIREMENTS.md exists."

      - name: Check REQUIREMENTS.md Has Required Sections
        run: |
          echo "Checking required sections..."
          grep -q "## 1. Modul-Übersicht" docs/REQUIREMENTS.md
          grep -q "## 2. Funktionale Anforderungen" docs/REQUIREMENTS.md
          grep -q "## 4. API-Spezifikation" docs/REQUIREMENTS.md
          grep -q "## 6. Validierung" docs/REQUIREMENTS.md
          grep -q "## 7. Test-Spezifikation" docs/REQUIREMENTS.md
          grep -q "## 8. Roadmap" docs/REQUIREMENTS.md
          echo "All required sections present."
